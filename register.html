<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Groww Creator</title>
  <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'teal-primary': '#14B8A6',
            'teal-hover': '#2DD4BF',
            'slate-dark': '#1F2937',
            'mint-light': '#F0FDFA',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
  
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }
    .progress-step {
      transition: all 0.3s ease;
    }
    .progress-step.active {
      background: #14B8A6;
      color: white;
      border-color: #14B8A6;
    }

    /* RTL Support */
    [dir="rtl"] .animated-circle-left {
      left: auto;
      right: 2.5rem;
    }

    [dir="rtl"] .animated-circle-right {
      right: auto;
      left: 2.5rem;
    }

    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-mint-light/20 via-white to-gray-100 dark:from-[#111827] dark:via-slate-dark dark:to-[#111827] h-screen overflow-hidden flex flex-col transition-colors duration-300">

  <nav class="bg-white/90 dark:bg-slate-dark/90 border-b border-teal-primary/20 backdrop-blur-md z-50 flex-shrink-0 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14 sm:h-16">

        <div class="flex items-center">
          <a href="index.html" class="hover:opacity-80 transition-opacity">
            <h1 class="text-lg sm:text-2xl font-bold text-slate-dark dark:text-white transition-colors duration-300">
              Groww <span class="text-teal-primary">Creator</span>
            </h1>
          </a>
        </div>

        <div class="flex items-center space-x-2">
          <button id="rtl-toggle" class="w-8 h-8 rounded-full bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 flex items-center justify-center text-slate-dark dark:text-white transition duration-300 ml-2 text-[10px] sm:text-xs font-semibold" title="Toggle RTL">
            RTL
          </button>

          <button id="theme-toggle" class="w-8 h-8 rounded-full bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 flex items-center justify-center text-slate-dark dark:text-white transition duration-300 ml-2" title="Toggle Theme">
            <i class="fas fa-moon dark:hidden text-xs"></i>
            <i class="fas fa-sun hidden dark:inline text-xs"></i>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="animated-circle-left absolute top-20 ltr:left-10 rtl:right-10 w-72 h-72 bg-teal-primary/10 rounded-full blur-3xl animate-pulse pointer-events-none hidden sm:block"></div>
  <div class="animated-circle-right absolute bottom-20 ltr:right-10 rtl:left-10 w-96 h-96 bg-teal-primary/5 rounded-full blur-3xl animate-pulse pointer-events-none hidden sm:block" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 flex items-center justify-center px-4 overflow-hidden min-h-[calc(100vh-64px)] py-2">
    <div class="w-full max-w-[26rem]">
      
      <div class="bg-white dark:bg-slate-dark rounded-3xl shadow-2xl p-4 sm:p-5 border border-gray-100 dark:border-gray-800 animate-fade-in relative z-10 my-auto">

        <div class="text-center mb-3">
          <div class="w-10 h-10 sm:w-12 sm:h-12 bg-mint-light/30 dark:bg-teal-primary/10 rounded-full flex items-center justify-center mx-auto mb-2">
            <i class="fas fa-gem text-teal-primary text-lg"></i>
          </div>
          <h2 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">Create Account</h2>
          <p class="text-[11px] text-gray-600 dark:text-gray-400">Start your creator journey today</p>
        </div>

        <div class="flex items-center justify-center mb-4 gap-1.5">
          <div class="progress-step active w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center font-bold border-2 text-[10px] shadow-sm">1</div>
          <div class="w-4 sm:w-5 h-0.5 bg-gray-200 dark:bg-gray-700 rounded"></div>
          <div class="progress-step w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center font-bold border-2 border-gray-200 dark:border-gray-700 text-gray-400 text-[10px]">2</div>
          <div class="w-4 sm:w-5 h-0.5 bg-gray-200 dark:bg-gray-700 rounded"></div>
          <div class="progress-step w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center font-bold border-2 border-gray-200 dark:border-gray-700 text-gray-400 text-[10px]">3</div>
        </div>

        <form class="space-y-2 sm:space-y-2.5" onsubmit="handleRegister(event)">

          <div class="grid grid-cols-2 gap-2.5">
            <div>
              <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">First Name</label>
              <input 
                type="text" 
                required
                placeholder="Jane"
                class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all"
              />
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">Last Name</label>
              <input 
                type="text" 
                required
                placeholder="Doe"
                class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all"
              />
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">
              <i class="fas fa-envelope ltr:mr-1 rtl:ml-1 text-teal-primary"></i>Email
            </label>
            <input 
              type="email" 
              required
              placeholder="jane@example.com"
              class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all"
            />
          </div>

          <div>
            <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">
              <i class="fas fa-phone ltr:mr-1 rtl:ml-1 text-teal-primary"></i>Phone
            </label>
            <input 
              type="tel" 
              required
              placeholder="+1 (555) 000-0000"
              class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all"
            />
          </div>

          <div class="grid grid-cols-2 gap-2.5">
            <div>
              <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">Password</label>
              <div class="relative">
                <input 
                  type="password" 
                  id="password"
                  required
                  placeholder="••••••••"
                  class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all ltr:pr-8 rtl:pl-8"
                />
                <button 
                  type="button" 
                  onclick="togglePassword('password', 'toggleIcon1')"
                  class="absolute ltr:right-2 rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-teal-primary transition-colors p-1"
                >
                  <i class="fas fa-eye text-xs" id="toggleIcon1"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-700 dark:text-gray-300 mb-0.5 uppercase tracking-wide">Confirm</label>
              <div class="relative">
                <input 
                  type="password" 
                  id="confirmPassword"
                  required
                  placeholder="••••••••"
                  class="w-full px-3 py-1.5 sm:py-2 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#111827] dark:text-white focus:border-teal-primary focus:ring-2 focus:ring-teal-primary/20 outline-none transition-all ltr:pr-8 rtl:pl-8"
                />
                <button 
                  type="button" 
                  onclick="togglePassword('confirmPassword', 'toggleIcon2')"
                  class="absolute ltr:right-2 rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-teal-primary transition-colors p-1"
                >
                  <i class="fas fa-eye text-xs" id="toggleIcon2"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center pt-1 group">
            <input type="checkbox" required class="w-3 h-3 rounded border-gray-300 text-teal-primary focus:ring-teal-primary focus:ring-2 cursor-pointer transition-colors">
            <span class="ltr:ml-2 rtl:mr-2 text-[10px] sm:text-[11px] text-gray-600 dark:text-gray-400 group-hover:text-gray-800 dark:group-hover:text-gray-200 transition-colors">
              I agree to the <span class="text-teal-primary font-bold cursor-pointer hover:text-teal-hover">Terms</span>
            </span>
          </div>

          <button 
            type="submit"
            class="w-full py-2 sm:py-2.5 mt-1 bg-teal-primary hover:bg-teal-hover text-white font-bold rounded-lg shadow-md hover:shadow-teal-primary/40 transform hover:-translate-y-0.5 transition-all duration-300 text-xs sm:text-sm flex items-center justify-center"
          >
            <i class="fas fa-arrow-right ltr:mr-2 rtl:ml-2"></i> <span>Continue</span>
          </button>

          <div class="relative my-2 sm:my-3">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
            </div>
            <div class="relative flex justify-center text-[9px] sm:text-[10px]">
              <span class="px-2 bg-white dark:bg-slate-dark text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wide">Or use</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <button 
              type="button"
              class="flex items-center justify-center px-2 py-1.5 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-[#1a2333] transition-all group"
            >
              <svg class="w-3.5 h-3.5 ltr:mr-1.5 rtl:ml-1.5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-[11px] font-bold text-gray-700 dark:text-gray-300">Google</span>
            </button>
            <button 
              type="button"
              class="flex items-center justify-center px-2 py-1.5 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-[#1a2333] transition-all group"
            >
              <i class="fab fa-apple text-gray-800 dark:text-white text-sm ltr:mr-1.5 rtl:ml-1.5 group-hover:scale-110 transition-transform"></i>
              <span class="text-[11px] font-bold text-gray-700 dark:text-gray-300">Apple</span>
            </button>
          </div>

        </form>

        <div class="mt-3 text-center text-[11px] text-gray-600 dark:text-gray-400">
          Already have an account? 
          <a href="login.html" class="text-teal-primary font-bold hover:underline hover:text-teal-hover transition-colors ltr:ml-1 rtl:mr-1">Sign In</a>
        </div>

      </div>

    </div>
  </div>

  <script>
    // Password Toggle Functionality
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = document.getElementById(iconId);

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Form Submission
    function handleRegister(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin ltr:mr-2 rtl:ml-2';
      span.innerText = 'Creating Account...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      setTimeout(() => {
        alert('Account created successfully! Redirecting to login...');
        window.location.href = 'login.html';
      }, 1500);
    }

    // Theme Toggle Function
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Function
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
